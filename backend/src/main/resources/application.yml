server:
  port: ${SERVER_PORT:37777}
  address: ${SERVER_ADDRESS:127.0.0.1}

# ============================================================================
# Evo-Memory Feature Flags (Section 6.1.1)
# ============================================================================
app:
  memory:
    # Enable/disable memory refinement (Phase 2)
    # When disabled, no refinement happens but quality scoring still works
    refine-enabled: ${MEMORY_REFINE_ENABLED:true}
    
    # Quality threshold for retrieval filtering (Phase 1)
    # Observations with quality below this are filtered out
    quality-threshold: ${MEMORY_QUALITY_THRESHOLD:0.6}
    
    # Refinement thresholds
    refine:
      # Delete observations with quality below this
      delete-threshold: ${MEMORY_REFINE_DELETE_THRESHOLD:0.3}
      # Cooldown days before allowing re-refinement
      cooldown-days: ${MEMORY_REFINE_COOLDOWN_DAYS:7}
      # Days before observation is considered stale
      stale-days: ${MEMORY_REFINE_STALE_DAYS:30}

    # Phase 3: Structured extraction configuration
    extraction:
      enabled: ${EXTRACTION_ENABLED:false}
      initial-run-max-candidates: ${EXTRACTION_MAX_CANDIDATES:100}
      max-observations-per-batch: ${EXTRACTION_BATCH_SIZE:20}
      max-batches-per-template: ${EXTRACTION_MAX_BATCHES:10}
      templates:
        - name: "user_preference"
          enabled: true
          template-class: "java.util.Map"
          session-id-pattern: "pref:{project}:{userId}"
          source-filter: ["user_statement", "manual"]
          prompt: |
            From the following conversation observations, extract user preferences.
            A preference is a stable choice, opinion, or constraint expressed by the user.

            Return a JSON object with a "preferences" array. Each item should have:
            - "category": the domain (e.g. "phone_brand", "price_range", "food")
            - "value": what the user prefers
            - "sentiment": "positive", "negative", or "neutral"
            - "confidence": 0.0 to 1.0

            If prior extraction is provided:
            - KEEP items that are still valid
            - REMOVE items contradicted by new observations
            - ADD new items from new observations
            - Do NOT re-add items already in prior unless confidence changed
          output-schema: |
            {"type":"object","properties":{"preferences":{"type":"array","items":{"type":"object","properties":{"category":{"type":"string"},"value":{"type":"string"},"sentiment":{"type":"string"},"confidence":{"type":"number"}},"required":["category","value"]}}}}

spring:
  application:
    name: claude-mem-java

  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      # Note: ChatModel and EmbeddingModel are created manually in SpringAiConfig

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1/claude_mem_dev}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:123456}}
    hikari:
      maximum-pool-size: 25
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1680000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  threads:
    virtual:
      enabled: true

  jackson:
    property-naming-strategy: SNAKE_CASE

  ai:
    mcp:
      server:
        name: claude-mem-mcp-server
        version: 0.1.0
        type: SYNC
        # SSE: Default for maximum client compatibility (no session management required)
        # STREAMABLE: Requires proper Mcp-Session-Id header handling by clients
        # STATELESS: Has Spring AI 1.1.2 bug (returns 404)
        protocol: SSE
        sse-endpoint: /sse
        sse-message-endpoint: /mcp/message
        streamable-http:
          mcp-endpoint: /mcp
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.claudemem: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    # Suppress Spring AI MCP BeanPostProcessor warnings (known issue: spring-ai/issues/4694)
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR
    # Suppress MCP protocol version mismatch warnings (client/server negotiation)
    io.modelcontextprotocol.server.McpAsyncServer: ERROR
    io.modelcontextprotocol.server.McpStatelessAsyncServer: ERROR

# Claude-Mem configuration
claudemem:
  # LLM provider configuration: 'openai' or 'anthropic'
  # - openai: Uses OpenAI-compatible API (DeepSeek, etc.)
  # - anthropic: Uses Anthropic-compatible API (Claude, GLM, etc.)
  llm:
    provider: ${CLAUDEMEM_LLM_PROVIDER:openai}
  # Log directory for structured logs (TS-compatible format)
  # Default: ~/.claude-mem/logs
  log.dir: ${CLAUDEMEM_LOG_DIR:${user.home}/.claude-mem/logs}
  # Stale message recovery settings
  stale-message:
    # Minutes after which a processing message is considered stale
    threshold-minutes: 10
    # Health indicator: stale count above this triggers Health.down()
    health-threshold: 5
    # Recovery task: run every N milliseconds (default: 5 minutes = 300000ms)
    recovery-interval-ms: 300000
  # Mode configuration
  # Mode profiles define observation types, concepts, and prompts for different use cases
  # Supports inheritance: code--zh (Chinese), code--chill (selective recording), etc.
  # Environment variable: CLAUDE_MEM_MODE
  mode: ${CLAUDE_MEM_MODE:code}
  # Custom modes directory (optional, for development)
  # Default: classpath:modes/ (JAR embedded) or plugin/modes/ (development)
  modes-dir: ${CLAUDE_MEM_MODES_DIR:}
